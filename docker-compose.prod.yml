version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SECRET_TOKEN=${SECRET_TOKEN}
      - CORS_ORIGIN=${CORS_ORIGIN}
    ports:
      - "3000:3000"
    volumes:
      - openimpro_data:/app/database
      - openimpro_shows:/app/shows

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"

volumes:
  openimpro_data:
  openimpro_shows: